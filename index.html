<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lata de Sync — Калатрава</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Unbounded:wght@200;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f0e8d8;
      --deep: #0e0a05;
      --gold: #c8961e;
      --rust: #8b3a1a;
      --smoke: #9e8e72;
      --paper: #e8dcc8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--deep);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.35;
    }
    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(200,150,30,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 75% 85%, rgba(139,58,26,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 72px 32px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .label {
      font-family: 'Unbounded', sans-serif;
      font-weight: 200;
      font-size: 9px;
      letter-spacing: 0.4em;
      color: var(--smoke);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
      margin-bottom: 36px;
      text-align: center;
    }
    .cover-wrap {
      width: 300px;
      height: 300px;
      position: relative;
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeUp 1s ease 0.4s forwards;
    }
    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* warm glow border effect */
    .cover-wrap::after {
      content: '';
      position: absolute;
      inset: -1px;
      box-shadow:
        0 0 0 1px rgba(200,150,30,0.3),
        0 0 40px 8px rgba(200,130,20,0.18),
        0 0 80px 20px rgba(200,100,10,0.08);
      pointer-events: none;
    }
    .artist {
      font-family: 'Unbounded', sans-serif;
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.7s forwards;
      text-align: center;
    }
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(52px, 13vw, 88px);
      line-height: 0.9;
      letter-spacing: -0.01em;
      color: var(--cream);
      text-align: center;
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.85s forwards;
    }
    .title em { font-style: italic; }
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      color: var(--smoke);
      text-align: center;
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fadeUp 0.8s ease 1s forwards;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: var(--rust);
      margin: 30px auto;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.1s forwards;
    }
    .description {
      font-size: 18px;
      line-height: 1.75;
      color: rgba(240,232,216,0.72);
      text-align: center;
      max-width: 460px;
      font-weight: 300;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.2s forwards;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: 13px;
      font-style: italic;
      color: var(--smoke);
      text-align: center;
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.35s forwards;
      margin-bottom: 52px;
    }
    .stream-section {
      width: 100%;
      max-width: 400px;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.5s forwards;
    }
    .stream-label {
      font-family: 'Unbounded', sans-serif;
      font-weight: 200;
      font-size: 8px;
      letter-spacing: 0.4em;
      color: var(--smoke);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 18px;
    }
    .stream-buttons { display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      text-decoration: none;
      border: 1px solid rgba(200,150,30,0.22);
      background: rgba(200,150,30,0.03);
      color: var(--cream);
      font-family: 'Unbounded', sans-serif;
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(200,150,30,0.07), transparent);
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .btn:hover { border-color: rgba(200,150,30,0.55); background: rgba(200,150,30,0.07); color: var(--gold); transform: translateY(-1px); }
    .btn:hover::before { opacity: 1; }
    .btn-icon { width: 22px; height: 22px; flex-shrink: 0; opacity: 0.65; transition: opacity 0.35s; }
    .btn:hover .btn-icon { opacity: 1; }
    .btn-arrow { font-size: 14px; opacity: 0.35; transition: opacity 0.35s, transform 0.35s; }
    .btn:hover .btn-arrow { opacity: 0.75; transform: translateX(3px); }
    .footer {
      margin-top: 68px;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1s ease 1.8s forwards;
    }
    .footer-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(158,142,114,0.35), transparent);
      margin: 0 auto 22px;
    }
    .footer-text {
      font-family: 'Unbounded', sans-serif;
      font-weight: 200;
      font-size: 7.5px;
      letter-spacing: 0.4em;
      color: rgba(158,142,114,0.38);
      text-transform: uppercase;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @media (max-width: 480px) {
      .container { padding: 56px 24px 64px; }
      .cover-wrap { width: 240px; height: 240px; }
      .btn { padding: 16px 20px; }
    }
  </style>
</head>
